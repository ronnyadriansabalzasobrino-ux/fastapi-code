<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Reports - School System</title>

<link rel="stylesheet" href="css/Reports.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR (IGUAL DASHBOARD) -->
  <div class="sidebar">
    <app-sidebar></app-sidebar>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR (IGUAL DASHBOARD) -->
    <app-topbar></app-topbar>

    <!-- TITULO -->
    <div class="reports-title">
      📊 Reports
    </div>

    <div class="reports-subtitle">
      Visualización de datos del sistema académico
    </div>

    <!-- PDF SECTION -->
    <div class="card actions-card">

      <h3>🧾 Generar Reporte PDF</h3>

      <p>Descarga un reporte del sistema en formato PDF.</p>

      <button onclick="generatePDF()">
        📥 Descargar PDF
      </button>

    </div>

    <!-- POWER BI -->
    <div class="card report-card">

      <iframe
        class="powerbi-frame"
         src="https://app.powerbi.com/reportEmbed?reportId=28285965-bbed-4404-b8c0-228b8921318a&autoAuth=true&ctid=740be6bd-fd36-470e-94d9-0f0c777fadb9" frameborder="0" allowFullScreen="true"></iframe>
      </iframe>

    </div>

  </div>

</div>

<script src="components/sidebar_component.js"></script>
<script src="components/topbar_component.js"></script>

<script>
function generatePDF() {
  alert("Generando PDF... (luego lo conectamos con backend ReportLab)");

  // demo descarga
  window.open("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf");
}
</script>

</body>
</html>
