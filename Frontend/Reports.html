<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Reports - School System</title>

<link rel="stylesheet" href="css/Reports.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <app-sidebar></app-sidebar>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <app-topbar></app-topbar>

    <!-- HEADER -->
    <div class="reports-header">
      <div class="reports-title">📊 Reports</div>
      <div class="reports-subtitle">
        Visualización de datos del sistema académico
      </div>
    </div>

    <!-- CONTENT WRAPPER -->
    <div class="reports-content">

      <!-- CARD -->
      <div class="card actions-card">

        <h3>🧾 Generar Reporte PDF</h3>

        <p>Selecciona el nivel del reporte antes de generar el PDF.</p>

        <label>📊 Módulo de Reportes</label>

        <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte de Alertas</title>

<link rel="stylesheet" href="./css/Reports.css">
</head>

    <!-- 🔍 FILTROS -->
    <select id="risk_level">
      <option value="">Todos los riesgos</option>
      <option value="HIGH">HIGH</option>
      <option value="MEDIUM">MEDIUM</option>
      <option value="LOW">LOW</option>
    </select>

    <select id="state">
      <option value="">Todos los estados</option>
      <option value="ACTIVE">ACTIVE</option>
      <option value="CLOSED">CLOSED</option>
    </select>

    <input id="id_program" placeholder="ID Programa">

    <br><br>

    <!-- 🔥 BOTÓN -->
    <button onclick="generateReport()" class="btn-primary">
      📄 Generar PDF
    </button>

  </div>

</div>
<script src="./js/Reports.js"></script>
</div>

<script src="components/sidebar_component.js"></script>
<script src="components/topbar_component.js"></script>

<script>
function generatePDF() {

  const level = document.getElementById("level").value;

  if (!level) {
    alert("⚠️ Debes seleccionar un nivel (Low, Medium o High)");
    return;
  }

  // luego conectamos a backend
  window.open("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf");
}
</script>

</body>
</html>
