<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Gestión de Docentes</title>

<link rel="stylesheet" href="./css/Teachers.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

</head>

<body>

<div class="container">

<h1>Gestión de Docentes</h1>

<div class="card">

<h2>Formulario de docente</h2>
<input type="hidden" id="teacher_id">
<input id="name" placeholder="Nombre">
<input id="last_name" placeholder="Apellido">
<input id="number_id" placeholder="Número ID">
<input id="mail" placeholder="Correo">
<input id="phone" placeholder="Teléfono">
<input id="specialty" placeholder="Especialidad">

<br><br>

<button onclick="saveTeacher()">Guardar</button>
<button onclick="clearForm()">Limpiar</button>

<br><br>


</div>

<div class="table-card">
<teachers-table></teachers-table>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- 🔥 LIBRERÍA PDF -->

<script src="./components/teacher_table.js"></script>
<script src="./js/Teachers.js"></script>

</body>
</html>
