<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Gestion de Estudiantes</title>

<link rel="stylesheet" href="./css/Students.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

</head>

<body>

<div class="container">

<h1>Gestion de Estudiantes</h1>

<div class="card">

<h2>Formulario de estudiante</h2>
<input type="hidden" id="student_id">
<input id="name" placeholder="Nombre">
<input id="last_name" placeholder="Apellido">
<input id="number_id" placeholder="Número ID">
<input id="mail" placeholder="Correo">
<input id="phone" placeholder="Teléfono">
<input id="program_id" placeholder="ID del programa">
<input id="semester_id" placeholder="ID del semestre">
<br><br>

<button class="btn-primary" onclick="savestudent()">Guardar</button>
<button class="btn-clear" onclick="clearForm()">Limpiar</button>

<br><br>

<button onclick="generatePDFFStudents()" class="btn-primary">
📄 Generar Reporte PDF
</button>

</div>

<div class="table-card">
<students-table></students-table>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- 🔥 LIBRERÍA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="./components/students_table.js"></script>
<script src="./js/Students.js"></script>

</body>
</html>
